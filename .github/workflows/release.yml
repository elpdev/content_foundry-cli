name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Verify release prerequisites
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_GITHUB_TOKEN" ]; then
            echo "::error::Missing HOMEBREW_TAP_TOKEN repository secret"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Create or reuse release tag
        id: tag
        run: |
          existing_tag="$(git tag --points-at HEAD --list 'v*' --sort=-version:refname | sed -n '1p')"
          if [ -n "$existing_tag" ]; then
            echo "tag=$existing_tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(git tag -l 'v*' --sort=-version:refname | sed -n '1p')"
          if [ -z "$latest_tag" ]; then
            next_tag="v0.1.0"
          else
            version="${latest_tag#v}"
            major="${version%%.*}"
            rest="${version#*.}"
            minor="${rest%%.*}"
            patch="${rest##*.}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -a "$next_tag" -m "Release $next_tag"
          git push origin "refs/tags/$next_tag"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        run: |
          git fetch --force --tags origin
          git checkout "${{ steps.tag.outputs.tag }}"

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
